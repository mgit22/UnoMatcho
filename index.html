<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UNO MATCHO</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  /* Phaser mounts the canvas here */
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      margin: auto;
      touch-action: none;
    }
  </style>
  // Phaser library 
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  
</head>
<body>
  <div id="game-container"></div>
  <script src="game.js"></script>
</body>
</html>
